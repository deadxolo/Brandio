version: '3.8'

services:
  social-media-manager:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"      # Manager (main dashboard)
      - "3001:3001"      # Background Engine
      - "3002:3002"      # Post Generator
      - "3003:3003"      # Auto Poster
    environment:
      - NODE_ENV=production
      - PORT=8080
      - HOST=0.0.0.0
      # Add your API keys here or use .env file
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - META_APP_ID=${META_APP_ID}
      - META_APP_SECRET=${META_APP_SECRET}
      - TOKEN_ENCRYPTION_KEY=${TOKEN_ENCRYPTION_KEY}
    volumes:
      # Persist database and uploads
      - app-data:/app/shared/db
      - uploads:/app/manager/uploads
      - backgrounds:/app/background_engine/backgrounds
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  app-data:
  uploads:
  backgrounds:
