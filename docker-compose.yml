services:
  social-media-manager:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"      # Manager (main dashboard)
      - "3001:3001"      # Background Engine
      - "3002:3002"      # Post Generator
      - "3003:3003"      # Auto Poster
    # Load all secrets (JWT_SECRET, API_KEYS, INTERNAL_SERVICE_TOKEN, etc.) from .env
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=8080
      - HOST=0.0.0.0
    volumes:
      # Persist database and uploads
      - app-data:/app/shared/db
      - uploads:/app/manager/uploads
      - backgrounds:/app/background_engine/backgrounds
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  app-data:
  uploads:
  backgrounds:
