# Google Cloud Build configuration for Cloud Run deployment
#
# Usage:
#   gcloud builds submit --config cloudbuild.yaml
#
# Or trigger on git push via Cloud Build triggers

steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/social-media-manager:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/social-media-manager:latest'
      - '.'

  # Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/social-media-manager:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/social-media-manager:latest'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'social-media-manager'
      - '--image'
      - 'gcr.io/$PROJECT_ID/social-media-manager:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--port'
      - '8080'
      - '--set-env-vars'
      - 'NODE_ENV=production'

# Store images in Container Registry
images:
  - 'gcr.io/$PROJECT_ID/social-media-manager:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/social-media-manager:latest'

# Substitution variables (can be overridden)
substitutions:
  _REGION: 'us-central1'

# Build options
options:
  logging: CLOUD_LOGGING_ONLY
