<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create account · Brandio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --paper: #f4ecd8; --paper-2: #ede3c6; --ink: #0a0a0a;
      --pink: #ff3d7f; --cyan: #00d4ff; --yellow: #ffea00; --lime: #c6ff3d;
      --shadow: 6px 6px 0 0 var(--ink);
      --shadow-lg: 12px 12px 0 0 var(--ink);
      --border: 3px solid var(--ink);
      --border-thick: 4px solid var(--ink);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background: var(--paper);
      background-image: radial-gradient(var(--paper-2) 1.4px, transparent 1.4px);
      background-size: 18px 18px;
      color: var(--ink);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .black { font-family: 'Archivo Black', sans-serif; }
    .mag {
      width: 100%; max-width: 900px; background: var(--paper);
      border: var(--border-thick); box-shadow: var(--shadow-lg);
      display: grid; grid-template-columns: 1.05fr 1fr;
    }
    .masthead {
      background: var(--ink); color: var(--paper);
      padding: 34px 30px; display: flex; flex-direction: column; gap: 18px;
      border-right: var(--border-thick); position: relative; overflow: hidden;
    }
    .kicker { font-family: 'Space Mono', monospace; font-size: 12px; letter-spacing: .18em; text-transform: uppercase; color: var(--lime); }
    .rule { height: 3px; background: var(--paper); }
    .rule.thin { height: 2px; opacity: .5; }
    .wordmark { font-family: 'Archivo Black', sans-serif; font-size: clamp(44px, 8vw, 72px); line-height: .9; }
    .wordmark .dot { color: var(--cyan); }
    .lede { font-family: 'DM Serif Display', serif; font-style: italic; font-size: 22px; line-height: 1.25; max-width: 22ch; }
    .list { font-family: 'Space Mono', monospace; font-size: 13px; line-height: 2; text-transform: uppercase; letter-spacing: .04em; }
    .list b { color: var(--yellow); }
    .masthead-foot { margin-top: auto; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .barcode { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: .1em; opacity: .8; }
    .stamp {
      background: var(--lime); color: var(--ink); border: 3px solid var(--paper);
      transform: rotate(-6deg); padding: 6px 12px; font-family: 'Space Mono', monospace;
      font-weight: 700; font-size: 12px; text-transform: uppercase; box-shadow: 4px 4px 0 0 var(--cyan);
    }

    .panel { padding: 34px 30px; display: flex; flex-direction: column; }
    .tag {
      align-self: flex-start; background: var(--yellow); border: var(--border);
      box-shadow: 4px 4px 0 0 var(--ink); padding: 6px 14px; margin-bottom: 18px;
      font-family: 'Space Mono', monospace; font-weight: 700; text-transform: uppercase; letter-spacing: .12em; font-size: 13px;
    }
    label { display: block; font-family: 'Space Mono', monospace; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; font-size: 12px; margin: 13px 0 6px; }
    input {
      width: 100%; padding: 13px 14px; font: inherit; font-size: 16px; background: #fff;
      border: var(--border); outline: none; transition: box-shadow .08s, transform .08s, background .08s;
    }
    input:focus { background: #fffdf0; box-shadow: var(--shadow); transform: translate(-2px, -2px); }
    .hint { font-family: 'Space Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: .06em; margin-top: 6px; opacity: .7; }

    .btn {
      width: 100%; margin-top: 22px; padding: 16px; cursor: pointer;
      background: var(--cyan); color: var(--ink); border: var(--border-thick);
      box-shadow: var(--shadow); font-family: 'Archivo Black', sans-serif; font-size: 17px;
      text-transform: uppercase; letter-spacing: .04em; transition: transform .08s, box-shadow .08s;
    }
    .btn:hover { transform: translate(-2px, -2px); box-shadow: 9px 9px 0 0 var(--ink); }
    .btn:active { transform: translate(4px, 4px); box-shadow: 0 0 0 0 var(--ink); }
    .btn:disabled { opacity: .6; cursor: not-allowed; transform: none; box-shadow: var(--shadow); }

    .msg { display: none; margin-top: 16px; padding: 12px 14px; border: var(--border); background: var(--pink); color: var(--ink); font-weight: 700; box-shadow: 4px 4px 0 0 var(--ink); }
    .msg.show { display: block; }

    .foot { margin-top: auto; padding-top: 22px; font-family: 'Space Mono', monospace; font-size: 13px; text-transform: uppercase; letter-spacing: .04em; }
    .foot a { color: var(--ink); font-weight: 700; text-decoration: none; background: var(--yellow); border: 2px solid var(--ink); padding: 2px 7px; box-shadow: 3px 3px 0 0 var(--ink); display: inline-block; }
    .foot a:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 0 var(--ink); }

    @media (max-width: 720px) {
      .mag { grid-template-columns: 1fr; }
      .masthead { border-right: none; border-bottom: var(--border-thick); }
      .wordmark { font-size: 56px; }
    }
  </style>
</head>
<body>
  <div class="mag">
    <aside class="masthead">
      <div class="kicker">Issue Nº 01 — New Subscriber</div>
      <div class="rule"></div>
      <h1 class="wordmark">BRAND<span class="dot">·</span>IO</h1>
      <div class="rule thin"></div>
      <p class="lede">Join the studio.</p>
      <div class="list">
        <div>→ <b>AI</b> backgrounds &amp; captions</div>
        <div>→ <b>One</b> editor, every platform</div>
        <div>→ <b>Schedule</b> &amp; auto-publish</div>
      </div>
      <div class="masthead-foot">
        <span class="barcode">||‖|‖‖||‖|‖||‖ 0&nbsp;26&nbsp;2026</span>
        <span class="stamp">Free to start</span>
      </div>
    </aside>

    <main class="panel">
      <span class="tag">Create account</span>
      <form id="signupForm">
        <label for="name">Name</label>
        <input id="name" type="text" autocomplete="name" required placeholder="Your name" />

        <label for="email">Email</label>
        <input id="email" type="email" autocomplete="email" required placeholder="you@example.com" />

        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="new-password" required placeholder="At least 8 characters" />
        <div class="hint">Use at least 8 characters.</div>

        <button class="btn" id="submitBtn" type="submit">Create account →</button>
        <div class="msg" id="errorMsg"></div>
      </form>
      <div class="foot">Already a member? <a href="/login">Sign in</a></div>
    </main>
  </div>

  <script>
    (function () {
      var form = document.getElementById('signupForm');
      var btn = document.getElementById('submitBtn');
      var errEl = document.getElementById('errorMsg');

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        errEl.classList.remove('show');
        btn.disabled = true; btn.textContent = 'Creating…';
        try {
          var res = await fetch('/api/auth/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              name: document.getElementById('name').value.trim(),
              email: document.getElementById('email').value.trim(),
              password: document.getElementById('password').value
            })
          });
          var data = await res.json();
          if (!res.ok || !data.success) throw new Error(data.error || 'Sign up failed');
          localStorage.setItem('brandio_auth_token', data.token);
          localStorage.setItem('brandio_user', JSON.stringify(data.user));
          window.location.href = '/';
        } catch (err) {
          errEl.textContent = err.message;
          errEl.classList.add('show');
          btn.disabled = false; btn.textContent = 'Create account →';
        }
      });
    })();
  </script>
</body>
</html>
